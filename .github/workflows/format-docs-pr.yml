name: Format docs PR

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/format-docs-pr.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/format-slop-summary
          fetch-depth: 0
      - name: Export current documentation branch
        uses: actions/upload-artifact@v4
        with:
          name: fact-docs-workspace
          path: .
          include-hidden-files: true
