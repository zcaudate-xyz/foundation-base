name: Format docs PR

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/format-docs-pr.yml
      - .github/scripts/format_summary_facts.py

permissions:
  contents: write
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/format-slop-summary
          fetch-depth: 0

      - name: Convert imported Clojure examples to facts
        run: python3 .github/scripts/format_summary_facts.py

      - name: Validate generated source changes
        run: |
          set -euo pipefail
          test "$(git diff --name-only -- src-doc/documentation | wc -l | tr -d ' ')" = "8"
          git diff --check

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse changed pages with code.doc
        run: |
          set -euo pipefail
          mkdir -p .tmp
          cat > .tmp/validate_summary_facts.clj <<'CLJ'
          (require '[code.doc.parse :as parse])

          (def files
            ["src-doc/documentation/code/code_query.clj"
             "src-doc/documentation/std/lib_index.clj"
             "src-doc/documentation/std/std_block.clj"
             "src-doc/documentation/std/std_lib_apply.clj"
             "src-doc/documentation/std/std_lib_bin.clj"
             "src-doc/documentation/std/std_lib_component.clj"
             "src-doc/documentation/std_lang_introduction.clj"
             "src-doc/documentation/xt/xt_lang.clj"])

          (doseq [file files]
            (let [elements (parse/parse-file file {})]
              (when-not (seq elements)
                (throw (ex-info "Documentation page produced no elements"
                                {:file file})))))

          (println "Parsed" (count files) "documentation pages.")
          CLJ

          docker run --rm \
            -e 'CI=true' \
            -e "LEIN_JVM_OPTS=-Xms512m -Xmx3g -XX:+UseG1GC" \
            -v "$(pwd):$(pwd)" \
            -w "$(pwd)" \
            ghcr.io/zcaudate-xyz/infra-foundation-clean:ci \
            bash -lc 'set -euo pipefail; java -cp "$(lein classpath)" clojure.main .tmp/validate_summary_facts.clj'

      - name: Commit fact-based documentation
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/format-docs-pr.yml
          git rm -f .github/scripts/format_summary_facts.py
          git add src-doc/documentation .github/workflows/format-docs-pr.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "Represent imported Clojure examples as facts"
          git push origin HEAD:docs/format-slop-summary
