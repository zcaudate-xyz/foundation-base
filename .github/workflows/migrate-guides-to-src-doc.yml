name: Consolidate documentation sources

on:
  push:
    branches:
      - docs/merge-guides-slop
    paths:
      - .github/workflows/migrate-guides-to-src-doc.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/migrate-guides-to-src-doc.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: docs/merge-guides-slop
          fetch-depth: 0

      - name: Validate migration script
        run: python3 -m py_compile .github/scripts/migrate_guides_to_src_doc.py

      - name: Merge prose into src-doc
        id: migrate
        continue-on-error: true
        run: |
          set -o pipefail
          python3 .github/scripts/migrate_guides_to_src_doc.py 2>&1 | tee migration-error.log

      - name: Commit migration diagnostics
        if: steps.migrate.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration-error.log
          git commit -m "Record documentation migration failure"
          git push origin HEAD:docs/merge-guides-slop
          exit 1

      - name: Verify the migration
        if: steps.migrate.outcome == 'success'
        run: |
          test ! -e guides
          test ! -e plans/slop
          git diff --check
          test "$(git diff --name-only --diff-filter=D | grep -E '^(guides/|plans/slop/)' | wc -l | tr -d ' ')" -gt 0
          test "$(git diff --name-only | grep '^src-doc/' | wc -l | tr -d ' ')" -gt 0

      - name: Remove one-off migration machinery
        if: steps.migrate.outcome == 'success'
        run: |
          git checkout origin/main -- .github/workflows/make-docs.yml
          rm .github/scripts/migrate_guides_to_src_doc.py
          rm .github/workflows/migrate-guides-to-src-doc.yml
          rm -f migration-error.log
          rmdir .github/scripts 2>/dev/null || true

      - name: Commit consolidated documentation
        if: steps.migrate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git diff --cached --check
          git commit -m "Merge guides and slop documentation into src-doc"
          git push origin HEAD:docs/merge-guides-slop
