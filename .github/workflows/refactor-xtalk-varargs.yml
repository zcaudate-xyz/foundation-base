name: Refactor xtalk varargs

on:
  push:
    branches: [fix/xtalk-varargs-inline-specs]

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply language-specific refactor
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/refactor_xtalk_varargs.py
          python /tmp/refactor_xtalk_varargs.py

      - name: Commit refactor
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Move xtalk rest emission into language specs'
          git push origin HEAD:fix/xtalk-varargs-inline-specs
