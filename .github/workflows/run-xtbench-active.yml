name: XTBench Active

on:
  push:
    branches: [main, 'lang/ruby']
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUBY_IMAGE: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci

permissions:
  contents: write

jobs:
  run-xtbench-lang-tests:
    name: 01 - xt.lang / ruby
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.lang
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${RUBY_IMAGE}
          lein seedgen test '[xt.lang]' :with '[ruby]' :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-lang-ruby
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-event-tests:
    name: 02 - xt.event / ruby
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.event
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${RUBY_IMAGE}
          lein seedgen test '[xt.event]' :with '[ruby]' :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-event-ruby
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-substrate-tests:
    name: 03 - xt.substrate / ruby
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.substrate
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${RUBY_IMAGE}
          sh -lc 'gem install websocket-client-simple --no-document;
          lein seedgen test "[xt.substrate]" :with "[ruby]" :metrics target/xtbench-metrics/result.json'
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-substrate-ruby
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn
    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-db-tests:
    name: 05 - xt.db / ruby
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.db
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${RUBY_IMAGE}
          sh -lc 'gem install pg sqlite3 websocket-client-simple --no-document;
          lein seedgen test "[xt.db]" :with "[ruby]" :metrics target/xtbench-metrics/result.json'
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-db-ruby
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn
    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-kmi-tests:
    name: 10 - kmi.lang / ruby
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run kmi.lang
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${RUBY_IMAGE}
          lein seedgen test '[kmi.lang]' :with '[ruby]' :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-kmi-ruby
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  publish-metrics:
    name: Publish metrics
    if: always() && github.ref == 'refs/heads/main'
    needs: [run-xtbench-lang-tests, run-xtbench-event-tests, run-xtbench-substrate-tests, run-xtbench-db-tests, run-xtbench-kmi-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: xtbench-*
          path: target/xtbench-artifacts
      - name: Publish metrics branch
        run: bash bin/publish-xtbench-metrics active "$GITHUB_WORKSPACE/target/xtbench-artifacts" "$RUNNER_TEMP/xtbench-branch"
