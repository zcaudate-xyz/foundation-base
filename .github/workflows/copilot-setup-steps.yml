name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 21 (required by Leiningen / Clojure) ──────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── Leiningen ──────────────────────────────────────────────────────────
      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein \
            -o /usr/local/bin/lein
          chmod +x /usr/local/bin/lein
          lein version

      # ── Maven / Leiningen dependency cache ────────────────────────────────
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Node.js (JavaScript runtime – rt.basic.impl.process-js) ──────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node.js global packages
        run: npm install -g ws

      # ── Dart (Dart runtime – rt.basic.impl.process-dart) ─────────────────
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # ── PostgreSQL client tools (for rt.postgres connectivity checks) ─────
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      # ── Warm up Leiningen / download all project dependencies ─────────────
      - name: Warm up Leiningen dependencies
        run: lein deps
