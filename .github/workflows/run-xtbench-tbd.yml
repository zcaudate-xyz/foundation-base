name: XTBench TBD

on:
  push:
    branches: ['lang/scheme', 'lang/elisp', 'lang/julia']
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-xtbench-lang-tests:
    name: 01 - xt.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: scheme
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-scheme:ci
          - lang: elisp
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-elisp:ci
          - lang: julia
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-julia:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.lang
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.lang]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-lang-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-event-tests:
    name: 02 - xt.event / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: elisp
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-elisp:ci
          - lang: julia
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-julia:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run xt.event
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.event]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-event-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-kmi-tests:
    name: 10 - kmi.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: elisp
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-elisp:ci
          - lang: julia
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-julia:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Run kmi.lang
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[kmi.lang]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-kmi-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  publish-metrics:
    name: Publish metrics
    if: always() && github.ref == 'refs/heads/main'
    needs: [run-xtbench-lang-tests, run-xtbench-event-tests, run-xtbench-kmi-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: xtbench-*
          path: target/xtbench-artifacts
      - name: Setup Leiningen
        uses: DeLaGuardo/setup-clojure@v13
        with:
          lein: latest
      - name: Publish metrics branch
        run: bash bin/publish-xtbench-metrics tbd "$GITHUB_WORKSPACE/target/xtbench-artifacts" "$RUNNER_TEMP/xtbench-branch"
