name: Apply formatted docs

on:
  push:
    branches: [docs/merge-guides-slop]
    paths:
      - .github/workflows/apply-formatted-docs.yml

permissions:
  contents: read

jobs:
  apply:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/merge-guides-slop
          fetch-depth: 0
      - run: bash .github/scripts/format_all_docs.sh
