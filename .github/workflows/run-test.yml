name: Run Code

on:
  push:
    branches: [main, 'lang/**']
  pull_request:
    branches: [main]
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-incomplete:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/lang/')
    name: Incomplete - ${{ matrix.section }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        section: [hara, std, xt, code, foundation, web3, kmi, postgres]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Run Incomplete
        run: |
          mkdir -p target/manage-findings
          docker run --network host \
            -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}" \
            -e "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" \
            -e "GITHUB_SHA=${GITHUB_SHA}" \
            -e "GITHUB_REF=${GITHUB_REF}" \
            -e "GITHUB_RUN_ID=${GITHUB_RUN_ID}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /home/runner/.docker/config.json:/root/.docker/config.json:ro \
            -v $(pwd):$(pwd) \
            -w $(pwd) \
            ghcr.io/zcaudate-xyz/infra-foundation-clean:ci \
            lein run -m code.manage.automation \
            ${{ matrix.section }} target/manage-findings/${{ matrix.section }}.json

      - name: Upload incomplete report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-manage-incomplete-${{ matrix.section }}
          path: target/manage-findings/${{ matrix.section }}.json
          if-no-files-found: warn

  notify-incomplete:
    if: always() && github.ref == 'refs/heads/main'
    needs: [run-incomplete]
    name: Notify code.manage repair service
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CODE_MANAGE_WEBHOOK_URL: ${{ secrets.CODE_MANAGE_WEBHOOK_URL }}
      CODE_MANAGE_WEBHOOK_SECRET: ${{ secrets.CODE_MANAGE_WEBHOOK_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download incomplete reports
        uses: actions/download-artifact@v4
        with:
          pattern: code-manage-incomplete-*
          path: target/manage-findings

      - name: Send signed findings
        if: env.CODE_MANAGE_WEBHOOK_URL != '' && env.CODE_MANAGE_WEBHOOK_SECRET != ''
        run: node scripts/code_manage_poller/notify.mjs target/manage-findings

      - name: Explain disabled notification
        if: env.CODE_MANAGE_WEBHOOK_URL == '' || env.CODE_MANAGE_WEBHOOK_SECRET == ''
        run: echo "code.manage webhook is disabled until its URL and secret are configured"

  run-group-tests:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/lang/')
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hara
            target: "[hara]"
            command: lein test :with "[hara]"
          - name: std
            target: "[std]"
            command: lein test :with "[std]"
          - name: xt
            target: "[xt.]"
            command: lein test :with "[xt.]" :timeout-ns 300000
          - name: code
            target: "[code]"
            install_js_parser: true
            command: lein test :with "[code]"
          - name: script/net/math/lib/jvm
            target: "[script net math lib jvm]"
            command: lein test :with "[script net math lib jvm]"
          - name: solidity web3
            target: "[solidity web3]"
            command: lein test :with "[solidity web3]"
          - name: kmi
            target: "[kmi]"
            command: lein test :with "[kmi]"
          - name: postgres
            target: "[postgres]"
            command: lein test :with "[postgres]"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test database
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -d test-scratch -c 'CREATE DATABASE test;'
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -d test-scratch -c 'GRANT ALL PRIVILEGES ON DATABASE test TO postgres;'

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Pull runtime images
        if: matrix.name == 'hara'
        run: |
          docker pull ghcr.io/zcaudate-xyz/foundation-base/rt-twostep-haskell:latest
          docker pull ghcr.io/zcaudate-xyz/foundation-base/rt-twostep-lean:latest
          docker pull ghcr.io/zcaudate-xyz/foundation-base/rt-twostep-ocaml:latest
          docker pull ghcr.io/zcaudate-xyz/foundation-base/rt-basic-blender:latest

      - name: Install root JS dependencies
        run: npm ci --legacy-peer-deps

      - name: Install JS parser dependencies
        if: matrix.install_js_parser == true
        working-directory: scripts/js_parser
        run: npm ci

      - name: run
        run: |
          mkdir -p .tmp
          docker run --network host \
            -e "CI=true" \
            -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS} -Djava.io.tmpdir=$(pwd)/.tmp" \
            -e "_JAVA_OPTIONS=-Djava.io.tmpdir=$(pwd)/.tmp" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /home/runner/.docker/config.json:/root/.docker/config.json:ro \
            -v $(pwd):$(pwd) \
            -w $(pwd) \
            ghcr.io/zcaudate-xyz/infra-foundation-clean:ci \
            bash -lc 'set -euxo pipefail &&
            apt-get update &&
            apt-get install -y --no-install-recommends lua5.4 python3 python3-pip redis-server &&
            ${{ matrix.command }}'

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

  run-lang-tests:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/lang/')
    name: Run Tests - ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: js
            install_js_parser: true
          - lang: lua
          - lang: python
          - lang: dart

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test database
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -d test-scratch -c 'CREATE DATABASE test;'
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -d test-scratch -c 'GRANT ALL PRIVILEGES ON DATABASE test TO postgres;'

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Install root JS dependencies
        if: matrix.lang == 'js'
        run: npm ci --legacy-peer-deps

      - name: Verify figma-ui package consumption
        if: matrix.lang == 'js'
        run: npm run test:figma-ui-package

      - name: Install JS parser dependencies
        if: matrix.install_js_parser == true
        working-directory: scripts/js_parser
        run: npm ci

      - name: Run Tests - ${{ matrix.lang }}
        run: |
          mkdir -p .tmp
          docker run --network host \
            -e "CI=true" \
            -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS} -Djava.io.tmpdir=$(pwd)/.tmp" \
            -e "_JAVA_OPTIONS=-Djava.io.tmpdir=$(pwd)/.tmp" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /home/runner/.docker/config.json:/root/.docker/config.json:ro \
            -v $(pwd):$(pwd) \
            -w $(pwd) \
            ghcr.io/zcaudate-xyz/infra-foundation-clean:ci \
            bash -lc 'set -euxo pipefail &&
              ${{ matrix.lang == 'js' && 'apt-get update && apt-get install -y --no-install-recommends ca-certificates curl gnupg && curl -fsSL https://deb.nodesource.com/setup_24.x | bash - && apt-get install -y --no-install-recommends nodejs' || 'true' }} &&
              ${{ matrix.lang == 'python' && 'pip install --no-cache-dir psycopg2-binary redis' || 'true' }} &&
              lein test :with "${{ matrix.lang }}"'

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
