name: Run Code

on: [push, repository_dispatch, workflow_dispatch]

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp

jobs:
  
  run-incomplete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Run Incomplete
        run: >
          docker run --network host 
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock 
          -v $(pwd):$(pwd) 
          -w $(pwd) 
          ghcr.io/zcaudate-xyz/infra-foundation-clean:ci lein incomplete
          
  run-group-tests:
    name: Run Tests - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hara
            target: "[hara]"
            command: lein test :with "[hara]"
          - name: std
            target: "[std]"
            command: lein test :with "[std]"
          - name: code
            target: "[code]"
            install_js_parser: true
            command: lein test :with "[code]"
          - name: script, net, math, lib, jvm
            target: "[script net math lib jvm]"
            command: lein test :with "[script net math lib jvm]"
          - name: rt
            target: "[rt]"
            command: lein test :with "[rt]"
          - name: xt
            target: "[xt]"
            command: apt-get update && apt-get install -y nodejs npm lua5.4 python3 python3-pip && lein test :with "[xt]"
          - name: xtalk
            target: "[xtalk]"
            command: lein test :with "[xtalk]"
          - name: indigo
            target: "[indigo]"
            command: lein test :with "[indigo]"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install JS parser dependencies
        if: matrix.install_js_parser == true
        working-directory: src-training/scripts/js_parser
        run: npm ci
        
      - name: Run Tests - ${{ matrix.name }}
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          bash -lc '${{ matrix.command }}'
        
    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log into GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Run xtbench tests - ${{ matrix.lang }}
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein test :with xtbench.${{ matrix.lang }}

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
          
  build-js-web:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Write SSH keys
        shell: bash
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.GH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H github.com > ~/.ssh/known_hosts
          
      - name: Checkout base repository
        uses: actions/checkout@v3
        with:
          repository: zcaudate/foundation-base
          path: foundation-base
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Deploying native-code
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $HOME/.ssh:/root/.ssh
          -v $(pwd):$(pwd) -w $(pwd)
          -e "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}"  
          -e "GITHUB_USER=${{ secrets.GH_USER }}"
          ghcr.io/zcaudate-xyz/infra-foundation-clean:ci 
          bash -c "cd foundation-base && git config --global --add safe.directory '*' && lein push-native-code"
