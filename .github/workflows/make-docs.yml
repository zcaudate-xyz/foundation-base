name: Publish Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src-doc/**'
      - 'src/**'
      - 'config/publish.edn'
      - 'config/publish/**'
      - 'template/**'
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate Documentation
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v /home/runner/.docker/config.json:/root/.docker/config.json:ro
          -v $(pwd):$(pwd)
          -w $(pwd)
          ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          lein exec -ep "(require '[code.doc :as doc]
                                  '[code.doc.executive :as exec])
                          (let [project (doc/make-project)
                                lookup  (exec/all-pages project)
                                sites   #{"core" "code" "xt" "std" "hara"}]
                            (doseq [site [:core :code :xt :std :hara]]
                              (doc/deploy-template site {:write true}))
                            (doseq [k (sort (filter #(sites (namespace %))
                                                    (keys lookup)))]
                              (exec/render k {:write true} lookup project)))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
