name: Publish Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src-doc/**'
      - 'src/**'
      - 'config/publish.edn'
      - 'config/publish/**'
      - 'template/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/make-docs.yml'
      - '.github/workflows/migrate-guides-to-src-doc.yml'
      - '.github/scripts/migrate_guides_to_src_doc.py'
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-documentation:
    if: github.event_name == 'pull_request' && github.head_ref == 'docs/merge-guides-slop'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: docs/merge-guides-slop
          fetch-depth: 0

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Validate migration script
        run: python3 -m py_compile .github/scripts/migrate_guides_to_src_doc.py

      - name: Merge prose into src-doc
        run: python3 .github/scripts/migrate_guides_to_src_doc.py

      - name: Verify the source trees were removed
        run: |
          test ! -e guides
          test ! -e plans/slop
          git diff --check

      - name: Read all authored Clojure documentation forms
        run: |
          docker run --rm \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            ghcr.io/zcaudate-xyz/infra-foundation-clean:ci \
            lein exec -ep "(doseq [f (filter #(and (.isFile %) (.endsWith (.getName %) \".clj\")) (file-seq (clojure.java.io/file \"src-doc\")))] (with-open [r (java.io.PushbackReader. (clojure.java.io/reader f))] (loop [] (let [form (read {:eof ::eof} r)] (when-not (= ::eof form) (recur))))))"

      - name: Remove one-off migration machinery
        run: |
          git checkout origin/main -- .github/workflows/make-docs.yml
          rm .github/scripts/migrate_guides_to_src_doc.py
          rm .github/workflows/migrate-guides-to-src-doc.yml
          rmdir .github/scripts 2>/dev/null || true

      - name: Commit consolidated documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git diff --cached --check
          git commit -m "Merge guides and slop documentation into src-doc"
          git push origin HEAD:docs/merge-guides-slop

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate Documentation
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v /home/runner/.docker/config.json:/root/.docker/config.json:ro
          -v $(pwd):$(pwd)
          -w $(pwd)
          ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          lein exec -ep "(require '[code.doc :as doc]
                                  '[code.doc.executive :as exec])
                          (let [project (doc/make-project)
                                lookup  (exec/all-pages project)
                                sites   #{\"core\" \"foundation.code\" \"std\" \"hara\"}]
                            (doseq [site [:core :foundation.code :std :hara]]
                              (doc/deploy-template site {:write true}))
                            (doseq [k (sort (filter #(sites (namespace %))
                                                    (keys lookup)))]
                              (exec/render k {:write true} lookup project)))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
