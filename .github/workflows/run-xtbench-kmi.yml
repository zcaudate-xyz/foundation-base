name: XTBench Core KMI

on:
  push:
    branches: [main, 'lang/dart', 'lang/python', 'lang/lua']
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-xtbench-kmi-tests:
    name: 10 - kmi.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[kmi.lang]' :with "[${{ matrix.lang }}]"
