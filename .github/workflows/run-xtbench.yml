name: Run xtbench Tests

on:
  push:
    branches: [main]
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-xtbench-lang-tests:
    if: github.ref == 'refs/heads/main'
    name: 01 - xt.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci
          # infra-foundation-xtbench-python has not been published, so fall back
          # to the clean image, which already bundles python3, lein, and deps.
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: php
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-php:ci
          - lang: scheme
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-scheme:ci
          - lang: elisp
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-elisp:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.lang]' :with "[${{ matrix.lang }}]"

  run-xtbench-event-tests:
    if: github.ref == 'refs/heads/main'
    name: 02 - xt.event / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: php
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-php:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.event]' :with "[${{ matrix.lang }}]"

  run-xtbench-substrate-tests:
    if: github.ref == 'refs/heads/main'
    name: 03 - xt.substrate / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: php
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-php:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.substrate]' :with "[${{ matrix.lang }}]"

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-db-tests:
    if: github.ref == 'refs/heads/main'
    name: 05 - xt.db / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: php
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-php:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.db]' :with "[${{ matrix.lang }}]"

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-kmi-tests:
    if: github.ref == 'refs/heads/main'
    name: 10 - kmi.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: php
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-php:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[kmi.lang]' :with "[${{ matrix.lang }}]"
