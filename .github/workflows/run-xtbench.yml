name: XTBench Core

on:
  push:
    branches: [main, 'lang/dart', 'lang/python', 'lang/lua']
  repository_dispatch:
  workflow_dispatch:

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-xtbench-lang-tests:
    name: 01 - xt.lang / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.lang]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-lang-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-event-tests:
    name: 02 - xt.event / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.event]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-event-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-net-tests:
    name: 02 - xt.net / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test '[xt.net]' :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-net-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

  run-xtbench-substrate-tests:
    name: 03 - xt.substrate / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          sh -lc '
            if [ "${{ matrix.lang }}" = "python" ]; then
              python -m pip uninstall -y websocket || true;
              python -m pip install --no-cache-dir --force-reinstall websocket-client;
            fi;
            exec lein seedgen test "[xt.substrate]" :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json
          '

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-substrate-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  run-xtbench-db-tests:
    name: 05 - xt.db / ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: python
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci
          - lang: lua
            image: ghcr.io/zcaudate-xyz/infra-foundation-clean:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: run
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          sh -lc '
            if [ "${{ matrix.lang }}" = "python" ]; then
              python -m pip uninstall -y websocket || true;
              python -m pip install --no-cache-dir --force-reinstall websocket-client psycopg2-binary;
            fi;
            exec lein seedgen test "[xt.db]" :with "[${{ matrix.lang }}]" :metrics target/xtbench-metrics/result.json
          '

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtbench-db-${{ matrix.lang }}
          path: target/xtbench-metrics/result.json
          if-no-files-found: warn

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432

  publish-metrics:
    name: Publish metrics
    if: always() && github.ref == 'refs/heads/main'
    needs: [run-xtbench-lang-tests, run-xtbench-event-tests, run-xtbench-net-tests, run-xtbench-substrate-tests, run-xtbench-db-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Download metrics
        uses: actions/download-artifact@v4
        with:
          pattern: xtbench-*
          path: target/xtbench-artifacts
      - name: Setup Leiningen
        uses: DeLaGuardo/setup-clojure@v13
        with:
          lein: latest
      - name: Publish metrics branch
        run: bash bin/publish-xtbench-metrics core "$GITHUB_WORKSPACE/target/xtbench-artifacts" "$RUNNER_TEMP/xtbench-branch"
