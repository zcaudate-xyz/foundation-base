name: Run xtbench Tests

on: [push, repository_dispatch, workflow_dispatch]

env:
  LEIN_JVM_OPTS: -Xms512m -Xmx3g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp

jobs:
  run-xtbench-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: dart
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-dart:ci
          - lang: ruby
            image: ghcr.io/zcaudate-xyz/infra-foundation-xtbench-ruby:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log into GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Run xtbench tests - ${{ matrix.lang }}
        run: >
          docker run --network host
          -e "LEIN_JVM_OPTS=${LEIN_JVM_OPTS}"
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $(pwd):$(pwd)
          -w $(pwd)
          ${{ matrix.image }}
          lein seedgen test :all :with "[${{ matrix.lang }}]"

    services:
      postgres:
        image: ghcr.io/zcaudate-xyz/infra-db:main
        env:
          POSTGRES_DB: test-scratch
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
